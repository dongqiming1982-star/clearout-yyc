<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>清除out YYC 后台</title>
  <style>
    :root { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #0f172a; background: #f8fafc; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header { position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #e2e8f0; background: rgba(255,255,255,.92); backdrop-filter: blur(16px); }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 22px; }
    h1 { margin: 0; font-size: 24px; }
    .sub { color: #64748b; font-size: 14px; margin-top: 6px; }
    .card { background: white; border: 1px solid #e2e8f0; border-radius: 22px; padding: 18px; box-shadow: 0 12px 30px rgba(15, 23, 42, .05); }
    .grid { display: grid; gap: 14px; }
    .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .stat b { display: block; font-size: 26px; }
    .stat span { color: #64748b; font-size: 13px; }
    .login { display: grid; gap: 10px; max-width: 520px; }
    input { width: 100%; border: 1px solid #cbd5e1; border-radius: 16px; padding: 12px 14px; font: inherit; }
    button { border: 0; border-radius: 999px; padding: 10px 14px; font-weight: 700; cursor: pointer; background: #991b1b; color: white; }
    button.secondary { background: #f1f5f9; color: #0f172a; }
    button.warning { background: #92400e; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .tabs { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
    .tabs button { background: #fff; color: #0f172a; border: 1px solid #e2e8f0; }
    .tabs button.active { background: #991b1b; color: #fff; border-color: #991b1b; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #e2e8f0; padding: 10px; text-align: left; vertical-align: top; }
    th { color: #64748b; font-size: 12px; background: #f8fafc; }
    .pill { display: inline-flex; padding: 4px 8px; border-radius: 999px; font-weight: 700; font-size: 12px; background: #f1f5f9; }
    .ok { background: #dcfce7; color: #166534; }
    .bad { background: #fee2e2; color: #991b1b; }
    .mid { background: #fef3c7; color: #92400e; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .error { color: #991b1b; font-weight: 700; }
    .muted { color: #64748b; }
    .scroll { overflow-x: auto; }
    @media (max-width: 780px) { .stats { grid-template-columns: 1fr 1fr; } .wrap { padding: 16px; } table { min-width: 900px; } }
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>清除out YYC 后台</h1>
    <div class="sub">内部管理后台：管理服务商、客户需求和认领记录。不要分享后台密码。</div>
  </div>
</header>

<main class="wrap grid">
  <section class="card login" id="loginBox">
    <b>后台密码</b>
    <input id="tokenInput" type="password" placeholder="输入 ADMIN_TOKEN" />
    <div class="actions">
      <button onclick="saveToken()">进入后台</button>
      <button class="secondary" onclick="clearToken()">清除</button>
    </div>
    <div class="muted">后台密码只保存在当前浏览器的 localStorage 中。</div>
  </section>

  <section id="app" style="display:none">
    <div class="grid stats" id="stats"></div>

    <div class="tabs">
      <button id="tab-providers" onclick="showTab('providers')">服务商</button>
      <button id="tab-leads" onclick="showTab('leads')">客户需求</button>
      <button id="tab-claims" onclick="showTab('claims')">认领记录</button>
      <button class="secondary" onclick="loadAll()">刷新</button>
    </div>

    <div id="message"></div>

    <section class="card" id="providersPanel"></section>
    <section class="card" id="leadsPanel" style="display:none"></section>
    <section class="card" id="claimsPanel" style="display:none"></section>
  </section>
</main>

<script>
let token = localStorage.getItem('clearout_admin_token') || ''
let currentTab = 'providers'

document.getElementById('tokenInput').value = token

function esc(v) {
  return String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))
}

function badge(text, cls='') {
  return `<span class="pill ${cls}">${esc(text)}</span>`
}

function setMessage(msg, error=false) {
  document.getElementById('message').innerHTML = msg ? `<p class="${error ? 'error' : 'muted'}">${esc(msg)}</p>` : ''
}

async function api(path, options={}) {
  const res = await fetch(path, {
    ...options,
    headers: {
      'content-type': 'application/json',
      'x-admin-token': token,
      ...(options.headers || {}),
    },
  })
  const data = await res.json().catch(() => null)
  if (!res.ok) throw new Error(data?.error || `Request failed: ${res.status}`)
  return data
}

function saveToken() {
  token = document.getElementById('tokenInput').value.trim()
  localStorage.setItem('clearout_admin_token', token)
  loadAll()
}

function clearToken() {
  localStorage.removeItem('clearout_admin_token')
  token = ''
  document.getElementById('tokenInput').value = ''
  document.getElementById('app').style.display = 'none'
  document.getElementById('loginBox').style.display = 'grid'
}

function showTab(tab) {
  currentTab = tab
  for (const id of ['providers','leads','claims']) {
    document.getElementById(`tab-${id}`).classList.toggle('启用', id === tab)
    document.getElementById(`${id}Panel`).style.display = id === tab ? 'block' : 'none'
  }
}

async function loadAll() {
  try {
    if (!token) throw new Error('请先输入后台密码。')
    setMessage('加载中...')
    document.getElementById('loginBox').style.display = 'none'
    document.getElementById('app').style.display = 'block'
    await Promise.all([loadSummary(), load服务商(), load客户需求(), load认领记录()])
    showTab(currentTab)
    setMessage('')
  } catch (e) {
    setMessage(e.message, true)
    document.getElementById('loginBox').style.display = 'grid'
    document.getElementById('app').style.display = 'none'
  }
}

async function loadSummary() {
  const { summary } = await api('/api/admin?resource=summary')
  document.getElementById('stats').innerHTML = `
    <div class="card stat"><b>${summary.providers_total}</b><span>服务商 total</span></div>
    <div class="card stat"><b>${summary.providers_pending}</b><span>服务商 pending</span></div>
    <div class="card stat"><b>${summary.leads_total}</b><span>客户需求 total</span></div>
    <div class="card stat"><b>${summary.claims_total}</b><span>认领记录 total</span></div>
  `
}

async function providerAction(provider_id, action) {
  await api('/api/admin?resource=provider&action=update', { method: 'POST', body: JSON.stringify({ provider_id, action }) })
  await loadAll()
}

async function load服务商() {
  const { providers } = await api('/api/admin?resource=providers')
  document.getElementById('providersPanel').innerHTML = `
    <h2>服务商</h2>
    <div class="scroll"><table>
      <thead><tr><th>商家名称</th><th>联系人</th><th>邮箱</th><th>电话</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
      <tbody>
      ${providers.map(p => `
        <tr>
          <td><b>${esc(p.business_name)}</b><br><span class="muted">${esc(p.public_id)}</span></td>
          <td>${esc(p.contact_name)}</td>
          <td>${esc(p.email)}</td>
          <td>${esc(p.phone)}</td>
          <td>
            ${p.approved ? badge('已批准','ok') : badge('待审核','mid')}
            ${p.active ? badge('启用','ok') : badge('停用','bad')}
          </td>
          <td>${esc(new Date(p.created_at).toLocaleString())}</td>
          <td class="actions">
            <button onclick="providerAction('${p.id}','approve')">批准</button>
            <button class="secondary" onclick="providerAction('${p.id}','activate')">启用</button>
            <button class="warning" onclick="providerAction('${p.id}','suspend')">暂停</button>
          </td>
        </tr>
      `).join('')}
      </tbody>
    </table></div>
  `
}

async function leadAction(lead_id, action) {
  await api('/api/admin?resource=lead&action=update', { method: 'POST', body: JSON.stringify({ lead_id, action }) })
  await loadAll()
}

async function load客户需求() {
  const { leads } = await api('/api/admin?resource=leads')
  document.getElementById('leadsPanel').innerHTML = `
    <h2>客户需求</h2>
    <div class="scroll"><table>
      <thead><tr><th>需求</th><th>客户</th><th>联系人</th><th>任务</th><th>状态</th><th>共享名额</th><th>创建时间</th><th>操作</th></tr></thead>
      <tbody>
      ${leads.map(l => `
        <tr>
          <td><b>${esc(l.public_id)}</b><br><span class="muted">${esc(l.community_or_postal || l.area || '')}</span></td>
          <td>${esc(l.customer_name)}</td>
          <td>${esc(l.customer_phone)}<br>${esc(l.customer_email || '')}</td>
          <td>${esc(l.service_type)}<br><span class="muted">${esc(l.job_size)} · ${esc(l.timeline)}</span></td>
          <td>${badge(({published:'已发布',queued:'排队中',shared_active:'共享中',shared_full:'共享已满',exclusive_claimed:'独家已认领',expired:'已过期',rejected:'已拒绝'}[l.status] || l.status), l.status === 'published' || l.status === 'shared_active' ? 'ok' : l.status === 'queued' ? 'mid' : 'bad')}</td>
          <td>${esc(l.shared_claim_count)} / ${esc(l.shared_limit)}</td>
          <td>${esc(new Date(l.created_at).toLocaleString())}</td>
          <td class="actions">
            <button onclick="leadAction('${l.id}','publish')">发布</button>
            <button class="secondary" onclick="leadAction('${l.id}','queue')">排队</button>
            <button class="warning" onclick="leadAction('${l.id}','expire')">过期</button>
          </td>
        </tr>
      `).join('')}
      </tbody>
    </table></div>
  `
}

async function load认领记录() {
  const { claims } = await api('/api/admin?resource=claims')
  document.getElementById('claimsPanel').innerHTML = `
    <h2>认领记录</h2>
    <div class="scroll"><table>
      <thead><tr><th>时间</th><th>认领类型</th><th>状态</th><th>服务商</th><th>需求</th><th>客户</th></tr></thead>
      <tbody>
      ${claims.map(c => `
        <tr>
          <td>${esc(new Date(c.created_at).toLocaleString())}</td>
          <td>${badge(c.access === 'exclusive' ? '独家' : '共享', c.access === 'exclusive' ? 'mid' : 'ok')}</td>
          <td>${esc(c.status)}</td>
          <td><b>${esc(c.provider?.business_name || '')}</b><br>${esc(c.provider?.email || '')}<br>${esc(c.provider?.phone || '')}</td>
          <td>${esc(c.lead?.public_id || '')}<br>${esc(c.lead?.service_type || '')}<br>${esc(c.lead?.community_or_postal || '')}</td>
          <td>${esc(c.lead?.customer_name || '')}<br>${esc(c.lead?.customer_phone || '')}<br>${esc(c.lead?.customer_email || '')}</td>
        </tr>
      `).join('')}
      </tbody>
    </table></div>
  `
}

if (token) loadAll()
else showTab('providers')
</script>
</body>
</html>
