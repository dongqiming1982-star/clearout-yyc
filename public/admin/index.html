<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Clearout YYC Admin</title>
  <style>
    :root { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #0f172a; background: #f8fafc; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header { position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #e2e8f0; background: rgba(255,255,255,.92); backdrop-filter: blur(16px); }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 22px; }
    .top { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    h1 { margin: 0; font-size: 24px; }
    .sub { color: #64748b; font-size: 14px; margin-top: 6px; }
    .card { background: white; border: 1px solid #e2e8f0; border-radius: 22px; padding: 18px; box-shadow: 0 12px 30px rgba(15, 23, 42, .05); }
    .grid { display: grid; gap: 14px; }
    .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .stat b { display: block; font-size: 26px; }
    .stat span { color: #64748b; font-size: 13px; }
    .login { display: grid; gap: 10px; max-width: 520px; }
    input { width: 100%; border: 1px solid #cbd5e1; border-radius: 16px; padding: 12px 14px; font: inherit; }
    button { border: 0; border-radius: 999px; padding: 10px 14px; font-weight: 700; cursor: pointer; background: #991b1b; color: white; }
    button.secondary { background: #f1f5f9; color: #0f172a; }
    button.warning { background: #92400e; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .lang { display: flex; gap: 8px; }
    .lang button { background: #fff; color: #0f172a; border: 1px solid #e2e8f0; padding: 8px 12px; }
    .lang button.active { background: #991b1b; color: #fff; border-color: #991b1b; }
    .tabs { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
    .tabs button { background: #fff; color: #0f172a; border: 1px solid #e2e8f0; }
    .tabs button.active { background: #991b1b; color: #fff; border-color: #991b1b; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #e2e8f0; padding: 10px; text-align: left; vertical-align: top; }
    th { color: #64748b; font-size: 12px; background: #f8fafc; }
    .pill { display: inline-flex; padding: 4px 8px; border-radius: 999px; font-weight: 700; font-size: 12px; background: #f1f5f9; }
    .ok { background: #dcfce7; color: #166534; }
    .bad { background: #fee2e2; color: #991b1b; }
    .mid { background: #fef3c7; color: #92400e; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .error { color: #991b1b; font-weight: 700; }
    .muted { color: #64748b; }
    .scroll { overflow-x: auto; }

    .platform-controls { margin-top: 14px; }
    .control-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }
    .control-card { border: 1px solid #e2e8f0; border-radius: 18px; padding: 14px; background: #fff; }
    .control-card h3 { margin: 0; font-size: 15px; }
    .control-card p { margin: 8px 0 12px; color: #64748b; font-size: 12px; line-height: 1.5; }
    .control-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .control-status { display: inline-flex; border-radius: 999px; padding: 4px 8px; font-size: 12px; font-weight: 800; }
    .control-status.on { background: #dcfce7; color: #166534; }
    .control-status.off { background: #fee2e2; color: #991b1b; }
    .control-status.sms { background: #fee2e2; color: #991b1b; }
    .control-status.email { background: #dcfce7; color: #166534; }
    .control-note { margin-top: 12px; font-size: 13px; color: #64748b; }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 640px) { .control-grid { grid-template-columns: 1fr; } }


    .dispatch-summary { margin-top: 8px; display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 4px 8px; font-size: 12px; font-weight: 800; }
    .dispatch-summary.ok { background: #dcfce7; color: #166534; }
    .dispatch-summary.mid { background: #fef3c7; color: #92400e; }
    .dispatch-summary.bad { background: #fee2e2; color: #991b1b; }


    .dispatch-summary-fixed {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 800;
    }
    .dispatch-summary-fixed.ok { background: #dcfce7; color: #166534; }
    .dispatch-summary-fixed.mid { background: #fef3c7; color: #92400e; }
    .dispatch-summary-fixed.bad { background: #fee2e2; color: #991b1b; }


    .dispatch-native {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 800;
    }
    .dispatch-native.ok { background: #dcfce7; color: #166534; }
    .dispatch-native.mid { background: #fef3c7; color: #92400e; }
    .dispatch-native.bad { background: #fee2e2; color: #991b1b; }


    .dispatch-overview {
      margin-top: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      background: #f8fafc;
      padding: 14px;
    }
    .dispatch-overview-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .dispatch-mini {
      border-radius: 14px;
      background: white;
      border: 1px solid #e2e8f0;
      padding: 10px;
    }
    .dispatch-mini b {
      display: block;
      font-size: 22px;
    }
    .dispatch-mini span {
      color: #64748b;
      font-size: 12px;
    }
    .dispatch-mini.bad b { color: #991b1b; }
    .dispatch-mini.mid b { color: #92400e; }
    .dispatch-mini.ok b { color: #166534; }
    @media (max-width: 980px) { .dispatch-overview-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 640px) { .dispatch-overview-grid { grid-template-columns: 1fr; } }


    .stat-subline-force {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 12px;
      color: #64748b;
      font-weight: 700;
    }
    .stat-subline-force span {
      border-radius: 999px;
      background: #f1f5f9;
      padding: 4px 8px;
    }

    @media (max-width: 780px) { .stats { grid-template-columns: 1fr 1fr; } .wrap { padding: 16px; } table { min-width: 900px; } .top { align-items: flex-start; flex-direction: column; } }
  </style>
</head>
<body>
<header>
  <div class="wrap top">
    <div>
      <h1 id="pageTitle">Clearout YYC Admin</h1>
      <div class="sub" id="pageSub">Internal provider, lead, and claim management. Do not share your admin token.</div>
    </div>
    <div class="lang">
      <button id="lang-en" onclick="setLang('en')">EN</button>
      <button id="lang-zh" onclick="setLang('zh')">中文</button>
    </div>
  </div>
</header>

<main class="wrap grid">
  <section class="card login" id="loginBox">
    <b id="loginTitle">Admin token</b>
    <input id="tokenInput" type="password" placeholder="Enter ADMIN_TOKEN" />
    <div class="actions">
      <button onclick="saveToken()" id="enterBtn">Enter Admin</button>
      <button class="secondary" onclick="clearToken()" id="clearBtn">Clear</button>
    </div>
    <div class="muted" id="tokenNote">Token is stored only in this browser's localStorage.</div>
  </section>

  <section id="app" style="display:none">
    <div class="grid stats" id="stats"></div>

    <section class="card platform-controls" id="platformControls" style="display:none">
      <div class="top">
        <div>
          <h2 id="platformControlsTitle" style="margin:0;font-size:20px">Platform controls</h2>
          <div class="sub" id="platformControlsSub">Control customer submissions, dispatch, claims, and dispatch channel.</div>
        </div>
        <div class="actions">
          <button class="secondary" onclick="loadPlatformControls()" id="platformControlsRefresh">Refresh controls</button>
          <button onclick="dispatchPendingLeads()" id="dispatchPendingLeadsBtn">Dispatch pending leads</button>
        </div>
      </div>
      <div class="control-grid" id="platformControlsGrid" style="margin-top:14px"></div>
      <div class="control-note" id="platformControlsMessage"></div>
      <div class="dispatch-overview" id="dispatchQueueOverview">Loading dispatch queue...</div>
    </section>


    <div class="tabs">
      <button id="tab-providers" onclick="showTab('providers')">Providers</button>
      <button id="tab-leads" onclick="showTab('leads')">Leads</button>
      <button id="tab-claims" onclick="showTab('claims')">Claims</button>
      <button class="secondary" onclick="loadAll()" id="refreshBtn">Refresh</button>
    </div>

    <div id="message"></div>

    <section class="card" id="providersPanel"></section>
    <section class="card" id="leadsPanel" style="display:none"></section>
    <section class="card" id="claimsPanel" style="display:none"></section>
  </section>
</main>

<script>
let token = localStorage.getItem('clearout_admin_token') || ''
let currentTab = 'providers'
let lang = localStorage.getItem('clearout_admin_lang') || 'en'

const text = {
  en: {
    title: 'Clearout YYC Admin',
    sub: 'Internal provider, lead, and claim management. Do not share your admin token.',
    token: 'Admin token',
    tokenPlaceholder: 'Enter ADMIN_TOKEN',
    enter: 'Enter Admin',
    clear: 'Clear',
    tokenNote: "Token is stored only in this browser's localStorage.",
    providers: 'Providers',
    leads: 'Leads',
    claims: 'Claims',
    refresh: 'Refresh',
    loading: 'Loading...',
    enterToken: 'Enter admin token first.',
    providersTotal: 'Providers total',
    providersPending: 'Providers pending',
    leadsTotal: 'Leads total',
    claimsTotal: 'Claims total',
    business: 'Business',
    contact: 'Contact',
    email: 'Email',
    phone: 'Phone',
    emailNotifications: 'Email notifications',
    subscribed: 'Subscribed',
    unsubscribed: 'Unsubscribed',
    resubscribed: 'Resubscribed',
    status: 'Status',
    created: 'Created',
    actions: 'Actions',
    lead: 'Lead',
    customer: 'Customer',
    job: 'Job',
    shared: 'Shared',
    time: 'Time',
    access: 'Access',
    provider: 'Provider',
    approve: 'Approve',
    activate: 'Activate',
    suspend: 'Suspend',
    publish: 'Publish',
    queue: 'Queue',
    expire: 'Expire',
    approved: 'approved',
    pending: 'pending',
    active: 'active',
    inactive: 'inactive',
    sharedAccess: 'shared',
    exclusiveAccess: 'exclusive',
    statusMap: {
      published: 'published',
      queued: 'queued',
      shared_active: 'shared active',
      shared_full: 'shared full',
      exclusive_claimed: 'exclusive claimed',
      expired: 'expired',
      rejected: 'rejected'
    }
  },
  zh: {
    title: 'Clearout YYC 后台',
    sub: '内部管理后台：管理服务商、客户需求和认领记录。不要分享后台密码。',
    token: '后台密码',
    tokenPlaceholder: '输入 ADMIN_TOKEN',
    enter: '进入后台',
    clear: '清除',
    tokenNote: '后台密码只保存在当前浏览器的 localStorage 中。',
    providers: '服务商',
    leads: '客户需求',
    claims: '认领记录',
    refresh: '刷新',
    loading: '加载中...',
    enterToken: '请先输入后台密码。',
    providersTotal: '服务商总数',
    providersPending: '待审核服务商',
    leadsTotal: '客户需求总数',
    claimsTotal: '认领总数',
    business: '商家名称',
    contact: '联系人',
    email: '邮箱',
    phone: '电话',
    emailNotifications: '邮件通知',
    subscribed: '已订阅',
    unsubscribed: '已退订',
    resubscribed: '重新订阅',
    status: '状态',
    created: '创建时间',
    actions: '操作',
    lead: '需求',
    customer: '客户',
    job: '任务',
    shared: '共享名额',
    time: '时间',
    access: '认领类型',
    provider: '服务商',
    approve: '批准',
    activate: '启用',
    suspend: '暂停',
    publish: '发布',
    queue: '排队',
    expire: '过期',
    approved: '已批准',
    pending: '待审核',
    active: '启用',
    inactive: '停用',
    sharedAccess: '共享',
    exclusiveAccess: '独家',
    statusMap: {
      published: '已发布',
      queued: '排队中',
      shared_active: '共享中',
      shared_full: '共享已满',
      exclusive_claimed: '独家已认领',
      expired: '已过期',
      rejected: '已拒绝'
    }
  }
}

document.getElementById('tokenInput').value = token

function t(key) { return text[lang][key] || key }
function statusText(status) { return text[lang].statusMap[status] || status }

function setLang(next) {
  lang = next
  localStorage.setItem('clearout_admin_lang', next)
  applyLang()
  if (document.getElementById('app').style.display !== 'none') loadAll()
}

function applyLang() {
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en'
  document.title = t('title')
  document.getElementById('pageTitle').textContent = t('title')
  document.getElementById('pageSub').textContent = t('sub')
  document.getElementById('loginTitle').textContent = t('token')
  document.getElementById('tokenInput').placeholder = t('tokenPlaceholder')
  document.getElementById('enterBtn').textContent = t('enter')
  document.getElementById('clearBtn').textContent = t('clear')
  document.getElementById('tokenNote').textContent = t('tokenNote')
  document.getElementById('tab-providers').textContent = t('providers')
  document.getElementById('tab-leads').textContent = t('leads')
  document.getElementById('tab-claims').textContent = t('claims')
  document.getElementById('refreshBtn').textContent = t('refresh')
  document.getElementById('lang-en').classList.toggle('active', lang === 'en')
  document.getElementById('lang-zh').classList.toggle('active', lang === 'zh')
}

function dispatchSummaryHtml(info) {
  const total = Number(info?.total || 0)
  const email = Number(info?.email || 0)
  const sms = Number(info?.sms || 0)
  const sent = Number(info?.sent || 0)
  const pending = Number(info?.pending || 0)
  const failed = Number(info?.failed || 0)
  const skipped = Number(info?.skipped || 0)

  if (!total) {
    return '<span class="dispatch-native bad">Dispatch: not created</span>'
  }

  const channel = sms > 0 && email === 0
    ? 'sms'
    : email > 0 && sms === 0
      ? 'email'
      : 'mixed'

  const parts = ['Dispatch: ' + channel, 'total ' + total]

  if (sent) parts.push('sent ' + sent)
  if (pending) parts.push('pending ' + pending)
  if (failed) parts.push('failed ' + failed)
  if (skipped) parts.push('skipped ' + skipped)

  let cls = 'ok'
  if (failed) cls = 'bad'
  else if (pending || skipped) cls = 'mid'

  return '<span class="dispatch-native ' + cls + '">' + esc(parts.join(' · ')) + '</span>'
}



function esc(v) {
  return String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))
}

function badge(label, cls='') {
  return `<span class="pill ${cls}">${esc(label)}</span>`
}

function setMessage(msg, error=false) {
  document.getElementById('message').innerHTML = msg ? `<p class="${error ? 'error' : 'muted'}">${esc(msg)}</p>` : ''
}

async function api(path, options={}) {
  const res = await fetch(path, {
    ...options,
    headers: {
      'content-type': 'application/json',
      'x-admin-token': token,
      ...(options.headers || {}),
    },
  })
  const data = await res.json().catch(() => null)
  if (!res.ok) throw new Error(data?.error || `Request failed: ${res.status}`)
  return data
}

function saveToken() {
  token = document.getElementById('tokenInput').value.trim()
  localStorage.setItem('clearout_admin_token', token)
  loadAll()
}

function clearToken() {
  localStorage.removeItem('clearout_admin_token')
  token = ''
  document.getElementById('tokenInput').value = ''
  document.getElementById('app').style.display = 'none'
  document.getElementById('loginBox').style.display = 'grid'
}

function showTab(tab) {
  currentTab = tab
  for (const id of ['providers','leads','claims']) {
    document.getElementById(`tab-${id}`).classList.toggle('active', id === tab)
    document.getElementById(`${id}Panel`).style.display = id === tab ? 'block' : 'none'
  }
}

async function loadAll() {
  try {
    if (!token) throw new Error(t('enterToken'))
    setMessage(t('loading'))
    document.getElementById('loginBox').style.display = 'none'
    document.getElementById('app').style.display = 'block'
    await Promise.all([loadSummary(), loadProviders(), loadLeads(), loadClaims()])
    showTab(currentTab)
    setMessage('')
  } catch (e) {
    setMessage(e.message, true)
    document.getElementById('loginBox').style.display = 'grid'
    document.getElementById('app').style.display = 'none'
  }
}

async function loadSummary() {
  const { summary } = await api('/api/admin?resource=summary')
  document.getElementById('stats').innerHTML = `
    <div class="card stat"><b>${summary.providers_total}</b><span>${t('providersTotal')}</span></div>
    <div class="card stat"><b>${summary.providers_pending}</b><span>${t('providersPending')}</span></div>
    <div class="card stat"><b>${summary.leads_total}</b><span>${t('leadsTotal')}</span></div>
    <div class="card stat"><b>${summary.claims_total}</b><span>${t('claimsTotal')}</span></div>
  `
}

async function providerAction(provider_id, action) {
  await api('/api/admin?resource=provider&action=update', { method: 'POST', body: JSON.stringify({ provider_id, action }) })
  await loadAll()
}

async function loadProviders() {
  const { providers } = await api('/api/admin?resource=providers')
  document.getElementById('providersPanel').innerHTML = `
    <h2>${t('providers')}</h2>
    <div class="scroll"><table>
      <thead><tr><th>${t('business')}</th><th>${t('contact')}</th><th>${t('email')}</th><th>${t('phone')}</th><th>${t('emailNotifications')}</th><th>${t('status')}</th><th>${t('created')}</th><th>${t('actions')}</th></tr></thead>
      <tbody>
      ${providers.map(p => `
        <tr>
          <td><b>${esc(p.business_name)}</b><br><span class="muted">${esc(p.public_id)}</span></td>
          <td>${esc(p.contact_name)}</td>
          <td>${esc(p.email)}</td>
          <td>${esc(p.phone)}</td>
          <td>
            ${
              p.notify_by_email === false
                ? badge(t('unsubscribed'),'bad')
                : (p.email_resubscribed_at ? badge(t('resubscribed'),'ok') : badge(t('subscribed'),'ok'))
            }
            ${p.email_unsubscribed_at ? `<br><span class="muted">Off: ${esc(new Date(p.email_unsubscribed_at).toLocaleString())}</span>` : ''}
            ${p.email_resubscribed_at ? `<br><span class="muted">On: ${esc(new Date(p.email_resubscribed_at).toLocaleString())}</span>` : ''}
          </td>
          <td>
            ${p.approved ? badge(t('approved'),'ok') : badge(t('pending'),'mid')}
            ${p.active ? badge(t('active'),'ok') : badge(t('inactive'),'bad')}
          </td>
          <td>${esc(new Date(p.created_at).toLocaleString())}</td>
          <td class="actions">
            <button onclick="providerAction('${p.id}','approve')">${t('approve')}</button>
            <button class="secondary" onclick="providerAction('${p.id}','activate')">${t('activate')}</button>
            <button class="warning" onclick="providerAction('${p.id}','suspend')">${t('suspend')}</button>
          </td>
        </tr>
      `).join('')}
      </tbody>
    </table></div>
  `
}

async function leadAction(lead_id, action) {
  await api('/api/admin?resource=lead&action=update', { method: 'POST', body: JSON.stringify({ lead_id, action }) })
  await loadAll()
}

async function loadLeads() {
  const { leads } = await api('/api/admin?resource=leads')
  document.getElementById('leadsPanel').innerHTML = `
    <h2>${t('leads')}</h2>
    <div class="scroll"><table>
      <thead><tr><th>${t('lead')}</th><th>${t('customer')}</th><th>${t('contact')}</th><th>${t('job')}</th><th>${t('status')}</th><th>${t('shared')}</th><th>${t('created')}</th><th>${t('actions')}</th></tr></thead>
      <tbody>
      ${leads.map(l => `
        <tr>
          <td><b>${esc(l.public_id)}</b><br><span class="muted">${esc(l.community_or_postal || l.area || '')}</span><br>${dispatchSummaryHtml(l.dispatch_status)}</td>
          <td>${esc(l.customer_name)}</td>
          <td>${esc(l.customer_phone)}<br>${esc(l.customer_email || '')}</td>
          <td>${esc(l.service_type)}<br><span class="muted">${esc(l.job_size)} · ${esc(l.timeline)}</span></td>
          <td>${badge(statusText(l.status), l.status === 'published' || l.status === 'shared_active' ? 'ok' : l.status === 'queued' ? 'mid' : 'bad')}</td>
          <td>${esc(l.shared_claim_count)} / ${esc(l.shared_limit)}</td>
          <td>${esc(new Date(l.created_at).toLocaleString())}</td>
          <td class="actions">
            <button onclick="leadAction('${l.id}','publish')">${t('publish')}</button>
            <button class="secondary" onclick="leadAction('${l.id}','queue')">${t('queue')}</button>
            <button class="warning" onclick="leadAction('${l.id}','expire')">${t('expire')}</button>
          </td>
        </tr>
      `).join('')}
      </tbody>
    </table></div>
  `
}

async function loadClaims() {
  const { claims } = await api('/api/admin?resource=claims')
  document.getElementById('claimsPanel').innerHTML = `
    <h2>${t('claims')}</h2>
    <div class="scroll"><table>
      <thead><tr><th>${t('time')}</th><th>${t('access')}</th><th>${t('status')}</th><th>${t('provider')}</th><th>${t('lead')}</th><th>${t('customer')}</th></tr></thead>
      <tbody>
      ${claims.map(c => `
        <tr>
          <td>${esc(new Date(c.created_at).toLocaleString())}</td>
          <td>${badge(c.access === 'exclusive' ? t('exclusiveAccess') : t('sharedAccess'), c.access === 'exclusive' ? 'mid' : 'ok')}</td>
          <td>${esc(c.status)}</td>

<script>
(function () {
  function getAdminTokenForPlatformControls() {
    const inputValue = (document.getElementById('tokenInput')?.value || '').trim()
    if (inputValue) return inputValue

    const candidates = [
      'clearout_admin_token',
      'clearoutAdminToken',
      'admin_token',
      'adminToken',
      'ADMIN_TOKEN',
      'clearout_admin'
    ]

    for (const key of candidates) {
      const value = (localStorage.getItem(key) || '').trim()
      if (value) return value
    }

    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i) || ''
      if (/admin/i.test(key) && /token/i.test(key)) {
        const value = (localStorage.getItem(key) || '').trim()
        if (value) return value
      }
    }

    return ''
  }

  function getAdminLangForPlatformControls() {
    return document.getElementById('lang-zh')?.classList.contains('active') ? 'zh' : 'en'
  }

  function t(zh, en) {
    return getAdminLangForPlatformControls() === 'zh' ? zh : en
  }

  async function fetchPlatformSettings(method, body) {
    const token = getAdminTokenForPlatformControls()
    if (!token) throw new Error('Missing ADMIN_TOKEN.')

    const url = '/api/admin?resource=settings' + (method === 'POST' ? '&action=update' : '')
    const response = await fetch(url, {
      method,
      headers: {
        'Content-Type': 'application/json',
        'x-admin-token': token
      },
      body: body ? JSON.stringify(body) : undefined
    })

    const text = await response.text()
    let data = null
    try { data = text ? JSON.parse(text) : null } catch { data = text }

    if (!response.ok) {
      throw new Error((data && data.error) || text || 'Failed to load platform settings.')
    }

    return data
  }

  function controlButton(label, onclick, active) {
    return '<button class="' + (active ? '' : 'secondary') + '" onclick="' + onclick + '">' + label + '</button>'
  }

  function statusPill(value, kind) {
    const cls = value === true ? 'on' : value === false ? 'off' : kind
    const text = value === true ? 'ON' : value === false ? 'OFF' : String(value || '').toUpperCase()
    return '<span class="control-status ' + cls + '">' + text + '</span>'
  }

  function renderPlatformControls(settings) {
    const box = document.getElementById('platformControls')
    const grid = document.getElementById('platformControlsGrid')
    const msg = document.getElementById('platformControlsMessage')
    const title = document.getElementById('platformControlsTitle')
    const sub = document.getElementById('platformControlsSub')
    const refresh = document.getElementById('platformControlsRefresh')

    if (!box || !grid) return

    box.style.display = 'block'
    title.textContent = t('平台总控', 'Platform controls')
    sub.textContent = t('控制客户提交、系统派单、服务商接单，以及 Email / SMS 派单通道。', 'Control customer submissions, dispatch, claims, and Email / SMS dispatch channel.')
    refresh.textContent = t('刷新总控', 'Refresh controls')
    const pendingBtn = document.getElementById('dispatchPendingLeadsBtn')
    if (pendingBtn) pendingBtn.textContent = t('派出积压需求', 'Dispatch pending leads')

    const customerOn = !!settings.customer_requests_enabled
    const dispatchOn = !!settings.lead_dispatch_enabled
    const claimsOn = !!settings.provider_claims_enabled
    const channel = settings.lead_dispatch_channel === 'sms' ? 'sms' : 'email'

    grid.innerHTML = [
      {
        title: t('客户提交', 'Customer requests'),
        desc: t('关闭后，客户不能提交新的清运需求。', 'When paused, customers cannot submit new requests.'),
        status: statusPill(customerOn),
        buttons: controlButton(customerOn ? t('暂停提交', 'Pause requests') : t('允许提交', 'Enable requests'), "updatePlatformControl('customer_requests_enabled'," + (!customerOn) + ")", customerOn)
      },
      {
        title: t('系统派单', 'Lead dispatch'),
        desc: t('关闭后，客户需求仍可进入后台，但不会发给服务商。', 'When paused, leads can enter admin but will not be sent to providers.'),
        status: statusPill(dispatchOn),
        buttons: controlButton(dispatchOn ? t('暂停派单', 'Pause dispatch') : t('允许派单', 'Enable dispatch'), "updatePlatformControl('lead_dispatch_enabled'," + (!dispatchOn) + ")", dispatchOn)
      },
      {
        title: t('服务商接单', 'Provider claiming'),
        desc: t('关闭后，服务商不能领取客户联系方式。', 'When paused, providers cannot unlock customer contact details.'),
        status: statusPill(claimsOn),
        buttons: controlButton(claimsOn ? t('暂停接单', 'Pause claiming') : t('允许接单', 'Enable claiming'), "updatePlatformControl('provider_claims_enabled'," + (!claimsOn) + ")", claimsOn)
      },
      {
        title: t('派单通道', 'Dispatch channel'),
        desc: t('控制新派单使用 Email 还是 SMS。', 'Controls whether new dispatches use Email or SMS.'),
        status: statusPill(channel, channel),
        buttons:
          controlButton('Email', "updatePlatformControl('lead_dispatch_channel','email')", channel === 'email') +
          controlButton('SMS', "updatePlatformControl('lead_dispatch_channel','sms')", channel === 'sms')
      }
    ].map(item => (
      '<div class="control-card">' +
        '<div class="control-row" style="justify-content:space-between">' +
          '<h3>' + item.title + '</h3>' +
          item.status +
        '</div>' +
        '<p>' + item.desc + '</p>' +
        '<div class="control-row">' + item.buttons + '</div>' +
      '</div>'
    )).join('')

    if (msg) msg.textContent = t('当前默认建议：客户提交 ON，系统派单 ON，服务商接单 ON，派单通道 Email。', 'Recommended default: requests ON, dispatch ON, claiming ON, channel Email.')
  }

  window.loadPlatformControls = async function () {
    const msg = document.getElementById('platformControlsMessage')
    try {
      if (msg) msg.textContent = t('正在刷新总控…', 'Refreshing controls...')
      const data = await fetchPlatformSettings('GET')
      renderPlatformControls(data.settings || {})
      if (msg) msg.textContent = t(
        '总控已刷新。当前默认建议：客户提交 ON，系统派单 ON，服务商接单 ON，派单通道 Email。',
        'Controls refreshed. Recommended default: requests ON, dispatch ON, claiming ON, channel Email.'
      )
    } catch (e) {
      const box = document.getElementById('platformControls')
      if (box) box.style.display = 'block'
      if (msg) msg.textContent = e instanceof Error ? e.message : 'Failed to load platform controls.'
    }
  }


  window.dispatchPendingLeads = async function () {
    const msg = document.getElementById('platformControlsMessage')
    const btn = document.getElementById('dispatchPendingLeadsBtn')

    try {
      if (btn) btn.disabled = true
      if (msg) msg.textContent = t('正在派出积压需求…', 'Dispatching pending leads...')

      const token = getAdminTokenForPlatformControls()
      if (!token) throw new Error('Missing ADMIN_TOKEN.')

      const response = await fetch('/api/admin?resource=dispatch&action=pending', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-admin-token': token
        },
        body: JSON.stringify({ limit: 50 })
      })

      const text = await response.text()
      let data = null
      try { data = text ? JSON.parse(text) : null } catch { data = text }

      if (!response.ok) {
        throw new Error((data && data.error) || text || 'Dispatch pending leads failed.')
      }

      const result = data.result || {}
      const checked = result.checked ?? 0
      const created = result.created ?? 0

      if (msg) {
        msg.textContent = t(
          '积压派单完成：检查 ' + checked + ' 条需求，创建 ' + created + ' 条通知。',
          'Pending dispatch complete: checked ' + checked + ' leads, created ' + created + ' notifications.'
        )
      }

      try { await window.loadPlatformControls() } catch {}
      try { if (typeof window.loadAll === 'function') await window.loadAll() } catch {}
    } catch (e) {
      if (msg) msg.textContent = e instanceof Error ? e.message : 'Dispatch pending leads failed.'
    } finally {
      if (btn) btn.disabled = false
    }
  }

  window.updatePlatformControl = async function (key, value) {
    const msg = document.getElementById('platformControlsMessage')
    try {
      if (msg) msg.textContent = t('正在保存…', 'Saving...')
      const data = await fetchPlatformSettings('POST', { key, value })
      renderPlatformControls(data.settings || {})
      if (msg) msg.textContent = t('设置已更新。', 'Settings updated.')
    } catch (e) {
      if (msg) msg.textContent = e instanceof Error ? e.message : 'Failed to update setting.'
    }
  }

  const previousLoadAll = window.loadAll
  if (typeof previousLoadAll === 'function') {
    window.loadAll = async function () {
      const result = await previousLoadAll.apply(this, arguments)
      try { await window.loadPlatformControls() } catch {}
      return result
    }
  }

  const previousSetLang = window.setLang
  if (typeof previousSetLang === 'function') {
    window.setLang = function (lang) {
      const result = previousSetLang.apply(this, arguments)
      try { window.loadPlatformControls() } catch {}
      return result
    }
  }

  document.addEventListener('DOMContentLoaded', function () {
    setTimeout(function () {
      try { window.loadPlatformControls() } catch {}
    }, 500)
  })
})()
</script>

(function () {
  function getToken() {

    const keys = [
      'clearout_admin_token',
      'clearoutAdminToken',
      'admin_token',

    ]

    for (const key of keys) {

      if (value && /admin/i.test(key) && /token/i.test(key)) return value
    }

    return ''
  }

  function esc(value) {
    return String(value ?? '').replace(/[&<>"']/g, function (c) {
      return ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      })[c]
    })
  }

  function isZh() {

  function card(label, value, todayLabel, todayValue, monthLabel, monthValue) {
    return [
      '<div class="card stat">',

      card(labels.pendingProviders, summary.providers_pending || 0, labels.today, summary.providers_pending_today || 0, labels.month, summary.providers_pending_month || 0),
      card(labels.leads, summary.leads_total || 0, labels.todayNew, summary.leads_today || 0, labels.monthNew, summary.leads_month || 0),
      card(labels.claims, summary.claims_total || 0, labels.today, summary.claims_today || 0, labels.month, summary.claims_month || 0)
    ].join('')
  }

  window.forceRefreshTopStats = async function () {

      cache: 'no-store',
      headers: { 'x-admin-token': token }
    })

    const data = await response.json()
    if (!response.ok || !data.ok) return

    renderForcedStats(data.summary || {})
  }

  function scheduleStatsRefresh() {
    setTimeout(function () { try { window.forceRefreshTopStats() } catch {} }, 200)
    setTimeout(function () { try { window.forceRefreshTopStats() } catch {} }, 800)
    setTimeout(function () { try { window.forceRefreshTopStats() } catch {} }, 1800)
  }

  const oldLoadAll = window.loadAll
  if (typeof oldLoadAll === 'function') {

    window.setLang = function () {
      const result = oldSetLang.apply(this, arguments)
      scheduleStatsRefresh()
      return result
    }
  }

  document.addEventListener('DOMContentLoaded', scheduleStatsRefresh)
  scheduleStatsRefresh()
})()
</script>

  const ZH_TO_EN = Object.fromEntries(
    Object.entries(EN_TO_ZH).map(([en, zh]) => [zh, en])
  )

  function isZh() {
    return document.getElementById('lang-zh')?.classList.contains('active')
  }

  function translateDispatchText(text, zh) {
    let out = String(text || '')

    if (zh) {
      out = out
        .replace(/^Dispatch:\s*/i, '派单：')
        .replace(/\bnot created\b/g, '未创建')
        .replace(/\btotal\b/g, '总数')
        .replace(/\bsent\b/g, '已发送')
        .replace(/\bpending\b/g, '待发送')
        .replace(/\bfailed\b/g, '失败')
        .replace(/\bskipped\b/g, '跳过')
    } else {
      out = out
        .replace(/^派单：/, 'Dispatch: ')
        .replace(/未创建/g, 'not created')
        .replace(/总数/g, 'total')
        .replace(/已发送/g, 'sent')
        .replace(/待发送/g, 'pending')
        .replace(/失败/g, 'failed')
        .replace(/跳过/g, 'skipped')
    }

    return out
  }

  function translateTextNode(node, zh) {
    const raw = node.nodeValue || ''
    const trimmed = raw.trim()
    if (!trimmed) return

    const map = zh ? EN_TO_ZH : ZH_TO_EN

    if (trimmed.startsWith('Dispatch:') || trimmed.startsWith('派单：')) {
      node.nodeValue = raw.replace(trimmed, translateDispatchText(trimmed, zh))
      return
    }

    if (map[trimmed]) {
      node.nodeValue = raw.replace(trimmed, map[trimmed])
    }
  }

  function translateDom(root) {
    const zh = isZh()

    const tokenInput = document.getElementById('tokenInput')
    if (tokenInput) {
      tokenInput.setAttribute('placeholder', zh ? '输入 ADMIN_TOKEN' : 'Enter ADMIN_TOKEN')
    }

    const walker = document.createTreeWalker(
      root || document.body,
      NodeFilter.SHOW_TEXT,
      {
        acceptNode(node) {
          const parent = node.parentElement
          if (!parent) return NodeFilter.FILTER_REJECT

          const tag = parent.tagName
          if (['SCRIPT', 'STYLE', 'TEXTAREA', 'INPUT', 'SELECT', 'OPTION'].includes(tag)) {
            return NodeFilter.FILTER_REJECT
          }

          return NodeFilter.FILTER_ACCEPT
        }
      }
    )

    const nodes = []
    while (walker.nextNode()) nodes.push(walker.currentNode)
    nodes.forEach(node => translateTextNode(node, zh))

    document.querySelectorAll('.dispatch-native, .dispatch-summary, .dispatch-summary-fixed').forEach(el => {
      el.textContent = translateDispatchText(el.textContent || '', zh)
    })
  }

  window.applyAdminI18nCleanup = function () {
    translateDom(document.body)
  }

  function scheduleI18n() {
    setTimeout(window.applyAdminI18nCleanup, 50)
    setTimeout(window.applyAdminI18nCleanup, 300)
    setTimeout(window.applyAdminI18nCleanup, 900)
    setTimeout(window.applyAdminI18nCleanup, 1800)
  }

  const oldSetLang = window.setLang
  if (typeof oldSetLang === 'function') {
    window.setLang = function () {
      const result = oldSetLang.apply(this, arguments)
      scheduleI18n()
      return result
    }
  }

  const oldLoadAll = window.loadAll
  if (typeof oldLoadAll === 'function') {
    window.loadAll = async function () {
      const result = await oldLoadAll.apply(this, arguments)
      scheduleI18n()
      return result
    }
  }

  const oldShowTab = window.showTab
  if (typeof oldShowTab === 'function') {
    window.showTab = function () {
      const result = oldShowTab.apply(this, arguments)
      scheduleI18n()
      return result
    }
  }

  const observer = new MutationObserver(function () {
    clearTimeout(window.__adminI18nCleanupTimer)
    window.__adminI18nCleanupTimer = setTimeout(window.applyAdminI18nCleanup, 120)
  })

  document.addEventListener('DOMContentLoaded', function () {
    try {
      observer.observe(document.body, { childList: true, subtree: true })
    } catch {}
    scheduleI18n()
  })

  scheduleI18n()
})()
</script>

</body>
</html>
