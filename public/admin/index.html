<!doctype html>

  <title>Clearout YYC Admin</title>
  <style>
    :root {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0f172a;
      background: #f8fafc;
    }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid #e2e8f0;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(16px);
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 22px; }
    .top { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    h1, h2, h3 { margin-top: 0; }
    h1 { margin-bottom: 0; font-size: 24px; }
    h2 { font-size: 20px; }
    h3 { font-size: 15px; }
    .sub { color: #64748b; font-size: 14px; margin-top: 6px; }
    .card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, .05);
    }
    .grid { display: grid; gap: 14px; }
    .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .stat b { display: block; font-size: 26px; }
    .stat span { color: #64748b; font-size: 13px; }
    .stat-subline {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 12px;
      color: #64748b;
      font-weight: 700;
    }
    .stat-subline span {
      border-radius: 999px;
      background: #f1f5f9;
      padding: 4px 8px;
    }
    .login { display: grid; gap: 10px; max-width: 520px; }
    input { width: 100%; border: 1px solid #cbd5e1; border-radius: 16px; padding: 12px 14px; font: inherit; }
    button { border: 0; border-radius: 999px; padding: 10px 14px; font-weight: 700; cursor: pointer; background: #991b1b; color: white; }
    button.secondary { background: #f1f5f9; color: #0f172a; }
    button.warning { background: #92400e; }
    button.danger { background: #991b1b; color: #fff; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .lang { display: flex; gap: 8px; }
    .lang button { background: #fff; color: #0f172a; border: 1px solid #e2e8f0; padding: 8px 12px; }
    .lang button.active { background: #991b1b; color: #fff; border-color: #991b1b; }
    .tabs { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
    .tabs button { background: #fff; color: #0f172a; border: 1px solid #e2e8f0; }
    .tabs button.active { background: #991b1b; color: #fff; border-color: #991b1b; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #e2e8f0; padding: 10px; text-align: left; vertical-align: top; }
    th { color: #64748b; font-size: 12px; background: #f8fafc; }
    .pill { display: inline-flex; padding: 4px 8px; border-radius: 999px; font-weight: 700; font-size: 12px; background: #f1f5f9; }
    .ok { background: #dcfce7; color: #166534; }
    .bad { background: #fee2e2; color: #991b1b; }
    .mid { background: #fef3c7; color: #92400e; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .error { color: #991b1b; font-weight: 700; }
    .muted { color: #64748b; }
    .scroll { overflow-x: auto; }

    .platform-controls { margin-top: 14px; }
    .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
    .control-card { border: 1px solid #e2e8f0; border-radius: 18px; padding: 14px; background: #fff; }
    .control-card h3 { margin: 0; }
    .control-card p { margin: 8px 0 12px; color: #64748b; font-size: 12px; line-height: 1.5; }
    .control-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .control-status { display: inline-flex; border-radius: 999px; padding: 4px 8px; font-size: 12px; font-weight: 800; }
    .control-status.on { background: #dcfce7; color: #166534; }
    .control-status.off { background: #fee2e2; color: #991b1b; }
    .control-status.sms { background: #fee2e2; color: #991b1b; }
    .control-status.email { background: #dcfce7; color: #166534; }
    .control-note { margin-top: 12px; font-size: 13px; color: #64748b; }

    .dispatch-badge {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 800;
    }
    .dispatch-overview {
      margin-top: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      background: #f8fafc;
      padding: 14px;
    }
    .dispatch-overview-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .dispatch-mini { border-radius: 14px; background: white; border: 1px solid #e2e8f0; padding: 10px; }
    .dispatch-mini b { display: block; font-size: 22px; }
    .dispatch-mini span { color: #64748b; font-size: 12px; }
    .dispatch-mini.bad b { color: #991b1b; }
    .dispatch-mini.mid b { color: #92400e; }
    .dispatch-mini.ok b { color: #166534; }

    @media (max-width: 980px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .dispatch-overview-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 780px) {
      .wrap { padding: 16px; }
      .top { align-items: flex-start; flex-direction: column; }
      table { min-width: 900px; }
    }
    @media (max-width: 640px) {
      .stats { grid-template-columns: 1fr; }
      .dispatch-overview-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<header>
  <div class="wrap top">
    <div>
      <h1 id="pageTitle">Clearout YYC Admin</h1>
      <div class="sub" id="pageSub">Internal provider, lead, and claim management. Do not share your admin token.</div>
    </div>
    <div class="lang">
      <button id="lang-en" type="button">EN</button>
      <button id="lang-zh" type="button">中文</button>
    </div>
  </div>
</header>

<main class="wrap grid">
  <section class="card login" id="loginBox">
    <b id="loginTitle">Admin token</b>
    <input id="tokenInput" type="password" placeholder="Enter ADMIN_TOKEN" />
    <div class="actions">
      <button type="button" id="enterBtn">Enter Admin</button>
      <button type="button" class="secondary" id="clearBtn">Clear</button>
    </div>
    <div class="muted" id="tokenNote">Token is stored only in this browser's localStorage.</div>
  </section>

  <section id="app" style="display:none">
    <div class="grid stats" id="stats"></div>

    <section class="card platform-controls" id="platformControls" style="display:none">
      <div class="top">
        <div>
          <h2 id="platformControlsTitle" style="margin:0;font-size:20px">Platform controls</h2>
          <div class="sub" id="platformControlsSub">Control customer submissions, dispatch, claims, exclusive buyout, and dispatch channel.</div>
        </div>
        <div class="actions">
          <button type="button" class="secondary" id="platformControlsRefresh">Refresh controls</button>
          <button type="button" id="dispatchPendingLeadsBtn">Dispatch pending leads</button>
        </div>
      </div>
      <div class="control-grid" id="platformControlsGrid" style="margin-top:14px"></div>
      <div class="control-note" id="platformControlsMessage"></div>
      <div class="dispatch-overview" id="dispatchQueueOverview"></div>
    </section>

    <div class="tabs">
      <button type="button" id="tab-providers" data-tab="providers">Providers</button>
      <button type="button" id="tab-leads" data-tab="leads">Leads</button>
      <button type="button" id="tab-claims" data-tab="claims">Claims</button>
      <button type="button" class="secondary" id="refreshBtn">Refresh</button>
    </div>

    <div id="message"></div>

    <section class="card" id="providersPanel"></section>
    <section class="card" id="leadsPanel" style="display:none"></section>
    <section class="card" id="claimsPanel" style="display:none"></section>
  </section>
</main>

  const $ = (id) => document.getElementById(id)
  const t = (key) => text[state.lang][key] || key
  const statusText = (status) => text[state.lang].statusMap[status] || status || ''

  function esc(value) {
    return String(value ?? '').replace(/[&<>"']/g, (char) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;',
    })[char])
  }

  function badge(label, cls = '') {
    return '<span class="pill ' + esc(cls) + '">' + esc(label) + '</span>'
  }

  function setMessage(message, error = false) {
    $('message').innerHTML = message ? '<p class="' + (error ? 'error' : 'muted') + '">' + esc(message) + '</p>' : ''
  }

  function formatDate(value) {
    const d = value ? new Date(value) : null
    if (!d || Number.isNaN(d.getTime())) return ''
    return d.toLocaleString()
  }

  function statCard(label, value, todayLabel, todayValue, monthLabel, monthValue) {
    return [
      '<div class="card stat">',
      '<b>' + esc(value || 0) + '</b>',
      '<span>' + esc(label) + '</span>',
      '<div class="stat-subline">',
      '<span>' + esc(todayLabel) + ' ' + esc(todayValue || 0) + '</span>',
      '<span>' + esc(monthLabel) + ' ' + esc(monthValue || 0) + '</span>',
      '</div>',
      '</div>',
    ].join('')
  }


function leadPhotosHtml(photos, count, expiredCount) {
  const active = Array.isArray(photos) ? photos.filter(photo => photo && photo.signed_url) : []
  const total = Number(count || active.length || 0)
  const expired = Number(expiredCount || 0)

  if (!total && !expired) {
    return '<div class="muted" style="margin-top:6px;font-size:12px">Photos: none</div>'
  }

  const thumbs = active.slice(0, 2).map(photo => {
    const url = esc(photo.signed_url)
    return '<a href="' + url + '" target="_blank" rel="noreferrer" title="Open photo" style="display:inline-block;margin:6px 6px 0 0">' +
      '<img src="' + url + '" alt="Lead photo" style="width:58px;height:58px;object-fit:cover;border-radius:12px;border:1px solid #e2e8f0" />' +
    '</a>'
  }).join('')

  const label = total ? ('Photos: ' + total) : ('Photos expired: ' + expired)

  return '<div style="margin-top:6px">' +
    '<span class="pill ' + (total ? 'ok' : 'mid') + '">' + esc(label) + '</span><br>' +
    thumbs +
    '</div>'
}


  function dispatchSummaryHtml(info) {
    const total = Number(info?.total || 0)
    const email = Number(info?.email || 0)
    const sms = Number(info?.sms || 0)
    const sent = Number(info?.sent || 0)
    const pending = Number(info?.pending || 0)
    const failed = Number(info?.failed || 0)
    const skipped = Number(info?.skipped || 0)

    if (!total) {
      return '<span class="dispatch-badge bad">' + esc(t('dispatch') + ': ' + t('notCreated')) + '</span>'
    }

    const channel = sms > 0 && email === 0 ? 'sms' : email > 0 && sms === 0 ? 'email' : 'mixed'
    const parts = [t('dispatch') + ': ' + channel, t('total') + ' ' + total]
    if (sent) parts.push(t('sent') + ' ' + sent)
    if (pending) parts.push(t('pending') + ' ' + pending)
    if (failed) parts.push(t('failed') + ' ' + failed)
    if (skipped) parts.push(t('skipped') + ' ' + skipped)

    let cls = 'ok'
    if (failed) cls = 'bad'
    else if (pending || skipped) cls = 'mid'

    return '<span class="dispatch-badge ' + cls + '">' + esc(parts.join(' · ')) + '</span>'
  }

  async function api(path, options = {}) {
    const response = await fetch(path, {
      ...options,
      cache: 'no-store',
      headers: {
        'content-type': 'application/json',
        'x-admin-token': state.token,
        ...(options.headers || {}),
      },
    })

    const data = await response.json().catch(() => null)
    if (!response.ok) throw new Error(data?.error || 'Request failed: ' + response.status)
    return data
  }

    $('tokenNote').textContent = t('tokenNote')
    $('tab-providers').textContent = t('providers')
    $('tab-leads').textContent = t('leads')
    $('tab-claims').textContent = t('claims')
    $('refreshBtn').textContent = t('refresh')
    $('platformControlsTitle').textContent = t('platformControls')
    $('platformControlsSub').textContent = t('platformControlsSub')
    $('platformControlsRefresh').textContent = t('refreshControls')
    $('dispatchPendingLeadsBtn').textContent = t('dispatchPendingLeads')
    $('lang-en').classList.toggle('active', state.lang === 'en')
    $('lang-zh').classList.toggle('active', state.lang === 'zh')
  }

  function setLang(next) {
    state.lang = next
    localStorage.setItem(storageKeys.lang, next)
    applyLang()
    if ($('app').style.display !== 'none') loadAll()
  }

  function showTab(tab) {
    state.currentTab = tab
    for (const id of ['providers', 'leads', 'claims']) {
      $('tab-' + id).classList.toggle('active', id === tab)
      $(id + 'Panel').style.display = id === tab ? 'block' : 'none'
    }
  }

  async function loadAll() {
    try {
      if (!state.token) throw new Error(t('enterToken'))
      setMessage(t('loading'))
      $('loginBox').style.display = 'none'
      $('app').style.display = 'block'
      await Promise.all([
        loadSummary(),
        loadProviders(),
        loadLeads(),
        loadClaims(),
        loadPlatformControls(),
        loadDispatchOverview(),
      ])
      showTab(state.currentTab)
      setMessage('')
    } catch (e) {
      setMessage(e instanceof Error ? e.message : String(e), true)
      $('loginBox').style.display = 'grid'
      $('app').style.display = 'none'
    }
  }

  async function loadSummary() {
    const { summary } = await api('/api/admin?resource=summary&_=' + Date.now())
    $('stats').innerHTML = [
      statCard(t('providersTotal'), summary.providers_total, t('todayNew'), summary.providers_today, t('monthNew'), summary.providers_month),
      statCard(t('providersPending'), summary.providers_pending, t('today'), summary.providers_pending_today, t('thisMonth'), summary.providers_pending_month),
      statCard(t('leadsTotal'), summary.leads_total, t('todayNew'), summary.leads_today, t('monthNew'), summary.leads_month),
      statCard(t('claimsTotal'), summary.claims_total, t('today'), summary.claims_today, t('thisMonth'), summary.claims_month),
    ].join('')
  }

  function controlButton(label, handlerName, value, active) {
    return '<button type="button" class="' + (active ? '' : 'secondary') + '" data-control="' + esc(handlerName) + '" data-value="' + esc(String(value)) + '">' + esc(label) + '</button>'
  }

  function statusPill(value, kind) {
    const cls = value === true ? 'on' : value === false ? 'off' : kind
    const label = value === true ? 'ON' : value === false ? 'OFF' : String(value || '').toUpperCase()
    return '<span class="control-status ' + esc(cls || '') + '">' + esc(label) + '</span>'
  }

  function renderPlatformControls(settings) {
    state.settings = settings
    $('platformControls').style.display = 'block'

    const customerOn = !!settings.customer_requests_enabled
    const dispatchOn = !!settings.lead_dispatch_enabled
    const claimsOn = !!settings.provider_claims_enabled
    const exclusiveOn = !!settings.exclusive_claims_enabled
    const channel = settings.lead_dispatch_channel === 'sms' ? 'sms' : 'email'

    const cards = [
      {
        key: 'customer_requests_enabled',
        title: t('customerRequests'),
        desc: t('customerRequestsDesc'),
        status: statusPill(customerOn),
        buttons: controlButton(customerOn ? t('pauseRequests') : t('enableRequests'), 'customer_requests_enabled', !customerOn, customerOn),
      },
      {
        key: 'lead_dispatch_enabled',
        title: t('leadDispatch'),
        desc: t('leadDispatchDesc'),
        status: statusPill(dispatchOn),
        buttons: controlButton(dispatchOn ? t('pauseDispatch') : t('enableDispatch'), 'lead_dispatch_enabled', !dispatchOn, dispatchOn),
      },
      {
        key: 'provider_claims_enabled',
        title: t('providerClaiming'),
        desc: t('providerClaimingDesc'),
        status: statusPill(claimsOn),
        buttons: controlButton(claimsOn ? t('pauseClaiming') : t('enableClaiming'), 'provider_claims_enabled', !claimsOn, claimsOn),
      },
      {
        key: 'exclusive_claims_enabled',
        title: t('exclusiveBuyout'),
        desc: t('exclusiveBuyoutDesc'),
        status: statusPill(exclusiveOn),
        buttons: controlButton(exclusiveOn ? t('disableExclusive') : t('enableExclusive'), 'exclusive_claims_enabled', !exclusiveOn, exclusiveOn),
      },
      {
        key: 'lead_dispatch_channel',
        title: t('dispatchChannel'),
        desc: t('dispatchChannelDesc'),
        status: statusPill(channel, channel),
        buttons:
          controlButton('Email', 'lead_dispatch_channel', 'email', channel === 'email') +
          controlButton('SMS', 'lead_dispatch_channel', 'sms', channel === 'sms'),
      },
    ]

    $('platformControlsGrid').innerHTML = cards.map((item) => [
      '<div class="control-card">',
      '<div class="control-row" style="justify-content:space-between">',
      '<h3>' + esc(item.title) + '</h3>',
      item.status,
      '</div>',
      '<p>' + esc(item.desc) + '</p>',
      '<div class="control-row">' + item.buttons + '</div>',
      '</div>',
    ].join('')).join('')

    $('platformControlsMessage').textContent = t('recommendedDefault')
  }

  async function loadPlatformControls() {
    const { settings } = await api('/api/admin?resource=settings&_=' + Date.now())
    renderPlatformControls(settings || {})
  }

  async function updatePlatformControl(key, value) {
    $('platformControlsMessage').textContent = t('saving')
    const { settings } = await api('/api/admin?resource=settings&action=update', {
      method: 'POST',
      body: JSON.stringify({ key, value }),
    })
    renderPlatformControls(settings || {})
    $('platformControlsMessage').textContent = t('settingsUpdated')
    await Promise.all([loadLeads(), loadDispatchOverview()]).catch(() => {})
  }

  function dispatchMini(label, value, cls) {
    return '<div class="dispatch-mini ' + (cls || '') + '"><b>' + esc(value || 0) + '</b><span>' + esc(label) + '</span></div>'
  }

  async function loadDispatchOverview() {
    const box = $('dispatchQueueOverview')
    box.textContent = t('loadingDispatchQueue')
    const { overview } = await api('/api/admin?resource=dispatch-overview&_=' + Date.now())
    const notifications = overview?.notifications || {}
    const pendingLeads = Number(overview?.pending_dispatch_leads || 0)
    const emailPending = Number(notifications.email_pending || 0)
    const smsPending = Number(notifications.sms_pending || 0)
    const failed = Number(notifications.email_failed || 0) + Number(notifications.sms_failed || 0)
    const sent = Number(notifications.sent || 0)

    box.innerHTML = [
      '<b>' + esc(t('dispatchOverview')) + '</b>',
      '<div class="dispatch-overview-grid">',
      dispatchMini(t('pendingDispatchLeads'), pendingLeads, pendingLeads ? 'mid' : 'ok'),
      dispatchMini(t('pendingEmail'), emailPending, emailPending ? 'mid' : 'ok'),
      dispatchMini(t('pendingSms'), smsPending, smsPending ? 'mid' : 'ok'),
      dispatchMini(t('failedSends'), failed, failed ? 'bad' : 'ok'),
      dispatchMini(t('sentTotal'), sent, 'ok'),
      '</div>',
      '<div class="control-note">' + esc(t('dispatchOverviewNote')) + '</div>',
    ].join('')
  }

  async function dispatchPendingLeads() {
    const button = $('dispatchPendingLeadsBtn')
    try {
      button.disabled = true
      $('platformControlsMessage').textContent = t('dispatchingPendingLeads')
      const data = await api('/api/admin?resource=dispatch&action=pending', {
        method: 'POST',
        body: JSON.stringify({ limit: 50 }),
      })
      const result = data.result || {}
      $('platformControlsMessage').textContent = t('pendingDispatchComplete') + ': ' + t('checked') + ' ' + (result.checked || 0) + ', ' + t('created') + ' ' + (result.created || 0) + '.'
      await Promise.all([loadLeads(), loadDispatchOverview(), loadSummary()]).catch(() => {})
    } catch (e) {
      $('platformControlsMessage').textContent = e instanceof Error ? e.message : 'Dispatch pending leads failed.'
    } finally {
      button.disabled = false
    }
  }

  async function providerAction(providerId, action) {
    await api('/api/admin?resource=provider&action=update', {
      method: 'POST',
      body: JSON.stringify({ provider_id: providerId, action }),
    })
    await loadAll()
  }

  async function leadAction(leadId, action) {
    await api('/api/admin?resource=lead&action=update', {
      method: 'POST',
      body: JSON.stringify({ lead_id: leadId, action }),
    })
    await loadAll()
  }

  async function loadProviders() {
    const { providers } = await api('/api/admin?resource=providers&_=' + Date.now())
    $('providersPanel').innerHTML = [
      '<h2>' + esc(t('providers')) + '</h2>',
      '<div class="scroll"><table>',
      '<thead><tr>',
      '<th>' + esc(t('business')) + '</th>',
      '<th>' + esc(t('contact')) + '</th>',
      '<th>' + esc(t('email')) + '</th>',
      '<th>' + esc(t('phone')) + '</th>',
      '<th>' + esc(t('emailNotifications')) + '</th>',
      '<th>' + esc(t('smsNotifications')) + '</th>',
      '<th>' + esc(t('status')) + '</th>',
      '<th>' + esc(t('created')) + '</th>',
      '<th>' + esc(t('actions')) + '</th>',
      '</tr></thead><tbody>',
      providers.map((provider) => [
        '<tr>',
        '<td><b>' + esc(provider.business_name) + '</b><br><span class="muted">' + esc(provider.public_id) + '</span>' + (provider.business_description ? '<br><span class="muted">' + esc(provider.business_description) + '</span>' : '') + '<br><span class="muted">Areas: ' + esc((provider.service_areas || []).join(', ')) + '</span><br><span class="muted">Types: ' + esc((provider.service_types || []).join(', ')) + '</span>' + (provider.daily_claim_limit ? '<br><span class="muted">Daily limit: ' + esc(provider.daily_claim_limit) + '</span>' : '') + '</td>',
        '<td>' + esc(provider.contact_name) + '</td>',
        '<td>' + esc(provider.email) + '</td>',
        '<td>' + esc(provider.phone) + '</td>',
        '<td>',
        provider.notify_by_email === false ? badge(t('unsubscribed'), 'bad') : (provider.email_resubscribed_at ? badge(t('resubscribed'), 'ok') : badge(t('subscribed'), 'ok')),
        provider.email_unsubscribed_at ? '<br><span class="muted">Off: ' + esc(formatDate(provider.email_unsubscribed_at)) + '</span>' : '',
        provider.email_resubscribed_at ? '<br><span class="muted">On: ' + esc(formatDate(provider.email_resubscribed_at)) + '</span>' : '',
        '</td>',
        '<td>',
        provider.notify_by_sms === true && !provider.sms_opt_out_at ? badge(t('optedIn'), 'ok') : badge(t('optedOut'), 'bad'),
        provider.sms_opt_out_at ? '<br><span class="muted">Off: ' + esc(formatDate(provider.sms_opt_out_at)) + '</span>' : '',
        provider.sms_opt_in_at ? '<br><span class="muted">On: ' + esc(formatDate(provider.sms_opt_in_at)) + '</span>' : '',
        '</td>',
        '<td>' + (provider.approved ? badge(t('approved'), 'ok') : badge(t('pending'), 'mid')) + ' ' + (provider.active ? badge(t('active'), 'ok') : badge(t('inactive'), 'bad')) + '</td>',
        '<td>' + esc(formatDate(provider.created_at)) + '</td>',
        '<td class="actions">',
        '<button type="button" data-provider-action="approve" data-id="' + esc(provider.id) + '">' + esc(t('approve')) + '</button>',
        '<button type="button" class="secondary" data-provider-action="activate" data-id="' + esc(provider.id) + '">' + esc(t('activate')) + '</button>',
        '<button type="button" class="warning" data-provider-action="suspend" data-id="' + esc(provider.id) + '">' + esc(t('suspend')) + '</button>',
        '</td>',
        '</tr>',
      ].join('')).join(''),
      '</tbody></table></div>',
    ].join('')
  }

  async function loadLeads() {
    const { leads } = await api('/api/admin?resource=leads&_=' + Date.now())
    $('leadsPanel').innerHTML = [
      '<h2>' + esc(t('leads')) + '</h2>',
      '<div class="scroll"><table>',
      '<thead><tr>',
      '<th>' + esc(t('lead')) + '</th>',
      '<th>' + esc(t('customer')) + '</th>',
      '<th>' + esc(t('contact')) + '</th>',
      '<th>' + esc(t('job')) + '</th>',
      '<th>' + esc(t('status')) + '</th>',
      '<th>' + esc(t('shared')) + '</th>',
      '<th>' + esc(t('created')) + '</th>',
      '<th>' + esc(t('actions')) + '</th>',
      '</tr></thead><tbody>',
      leads.map((lead) => [
        '<tr>',
        '<td><b>' + esc(lead.public_id) + '</b><br><span class="muted">' + esc(lead.community_or_postal || lead.area || '') + '</span><br>' + dispatchSummaryHtml(lead.dispatch_status) + leadPhotosHtml(lead.photos, lead.photo_count, lead.photo_expired_count) + '</td>',
        '<td>' + esc(lead.customer_name) + '</td>',
        '<td>' + esc(lead.customer_phone) + '<br>' + esc(lead.customer_email || '') + '</td>',
        '<td>' + esc(lead.service_type) + '<br><span class="muted">' + esc(lead.job_size) + ' · ' + esc(lead.timeline) + '</span></td>',
        '<td>' + badge(statusText(lead.status), lead.status === 'published' || lead.status === 'shared_active' ? 'ok' : lead.status === 'queued' ? 'mid' : 'bad') + '</td>',
        '<td>' + esc(lead.shared_claim_count) + ' / ' + esc(lead.shared_limit) + '</td>',
        '<td>' + esc(formatDate(lead.created_at)) + '</td>',
        '<td class="actions">',
        '<button type="button" data-lead-action="publish" data-id="' + esc(lead.id) + '">' + esc(t('publish')) + '</button>',
        '<button type="button" class="secondary" data-lead-action="queue" data-id="' + esc(lead.id) + '">' + esc(t('queue')) + '</button>',
        '<button type="button" class="warning" data-lead-action="expire" data-id="' + esc(lead.id) + '">' + esc(t('expire')) + '</button>',
        '</td>',
        '</tr>',
      ].join('')).join(''),
      '</tbody></table></div>',
    ].join('')
  }

  async function loadClaims() {
    const { claims } = await api('/api/admin?resource=claims&_=' + Date.now())
    $('claimsPanel').innerHTML = [
      '<h2>' + esc(t('claims')) + '</h2>',
      '<div class="scroll"><table>',
      '<thead><tr>',
      '<th>' + esc(t('time')) + '</th>',
      '<th>' + esc(t('access')) + '</th>',
      '<th>' + esc(t('status')) + '</th>',
      '<th>' + esc(t('provider')) + '</th>',
      '<th>' + esc(t('lead')) + '</th>',
      '<th>' + esc(t('customer')) + '</th>',
      '</tr></thead><tbody>',
      claims.map((claim) => [
        '<tr>',
        '<td>' + esc(formatDate(claim.created_at)) + '</td>',
        '<td>' + badge(claim.access === 'exclusive' ? t('exclusiveAccess') : t('sharedAccess'), claim.access === 'exclusive' ? 'mid' : 'ok') + '</td>',
        '<td>' + esc(statusText(claim.status)) + '</td>',
        '<td><b>' + esc(claim.provider?.business_name || '') + '</b><br>' + esc(claim.provider?.email || '') + '<br>' + esc(claim.provider?.phone || '') + '</td>',
        '<td>' + esc(claim.lead?.public_id || '') + '<br>' + esc(claim.lead?.service_type || '') + '<br>' + esc(claim.lead?.community_or_postal || '') + '</td>',
        '<td>' + esc(claim.lead?.customer_name || '') + '<br>' + esc(claim.lead?.customer_phone || '') + '<br>' + esc(claim.lead?.customer_email || '') + '</td>',
        '</tr>',
      ].join('')).join(''),
      '</tbody></table></div>',
    ].join('')
  }

  function saveToken() {
    state.token = $('tokenInput').value.trim()
    localStorage.setItem(storageKeys.token, state.token)
    loadAll()
  }

  function clearToken() {
    localStorage.removeItem(storageKeys.token)
    state.token = ''
    $('tokenInput').value = ''
    $('app').style.display = 'none'
    $('loginBox').style.display = 'grid'
  }

  function bindEvents() {
    $('lang-en').addEventListener('click', () => setLang('en'))
    $('lang-zh').addEventListener('click', () => setLang('zh'))
    $('enterBtn').addEventListener('click', saveToken)
    $('clearBtn').addEventListener('click', clearToken)
    $('refreshBtn').addEventListener('click', loadAll)
    $('platformControlsRefresh').addEventListener('click', async () => {
      await Promise.all([loadPlatformControls(), loadDispatchOverview()])
      $('platformControlsMessage').textContent = t('controlsRefreshed')
    })
    $('dispatchPendingLeadsBtn').addEventListener('click', dispatchPendingLeads)

    document.addEventListener('click', (event) => {
      const target = event.target
      if (!(target instanceof HTMLElement)) return

      const tab = target.getAttribute('data-tab')
      if (tab) return showTab(tab)

      const providerActionName = target.getAttribute('data-provider-action')
      if (providerActionName) return providerAction(target.getAttribute('data-id'), providerActionName)

      const leadActionName = target.getAttribute('data-lead-action')
      if (leadActionName) return leadAction(target.getAttribute('data-id'), leadActionName)

      const controlKey = target.getAttribute('data-control')
      if (controlKey) {
        const raw = target.getAttribute('data-value')
        const value = raw === 'true' ? true : raw === 'false' ? false : raw
        return updatePlatformControl(controlKey, value)
      }
    })
  }

  $('tokenInput').value = state.token
  bindEvents()
  applyLang()
  if (state.token) loadAll()
  else showTab('providers')
})()
</script>
</body>
</html>
